<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTF 智能標記工具</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap');

    :root {
      --ink: #1a1a2e;
      --ink-light: #3d3d5c;
      --paper: #f5f3ee;
      --paper-warm: #ede9e0;
      --accent: #c0392b;
      --accent-gold: #d4a017;
      --accent-blue: #1a6b8a;
      --line: #c8c2b4;
      --panel-bg: #ffffff;
      --tag-red: #fee2e2;
      --tag-blue: #dbeafe;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--ink);
      color: #fff;
      padding: 14px 16px 12px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -20px; right: -20px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--accent);
      opacity: .18;
    }
    .header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .04em;
      position: relative;
    }
    .header p {
      font-size: 10px;
      opacity: .55;
      margin-top: 2px;
      letter-spacing: .06em;
      position: relative;
    }

    /* ── Sections ── */
    .section {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
    }
    .section-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* ── Sliders ── */
    .slider-row {
      margin-bottom: 10px;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .slider-label span:first-child {
      font-size: 11.5px;
      color: var(--ink-light);
    }
    .slider-val {
      font-size: 11px;
      font-weight: 700;
      color: var(--ink);
      background: var(--paper-warm);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 1px 6px;
      min-width: 36px;
      text-align: center;
    }
    input[type=range] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 30%), var(--line) var(--pct, 30%));
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
    }

    /* ── Textareas ── */
    .field-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--ink-light);
      letter-spacing: .04em;
      margin-bottom: 4px;
      display: block;
    }
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 11.5px;
      color: var(--ink);
      background: var(--panel-bg);
      resize: none;
      outline: none;
      transition: border-color .2s;
      line-height: 1.55;
    }
    textarea:focus { border-color: var(--accent-blue); }
    .field-group { margin-bottom: 10px; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background .15s, transform .1s;
      margin-bottom: 8px;
    }
    .btn-primary:hover { background: #a93226; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { background: #bbb; cursor: not-allowed; }

    .btn-secondary {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: var(--accent-blue);
      border: 1.5px solid var(--accent-blue);
      border-radius: 8px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:hover { background: #eaf4f8; }

    .btn-row { padding: 14px; }

    /* ── Status ── */
    #statusBox {
      margin: 0 14px 14px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      display: none;
    }
    #statusBox.info  { background: var(--tag-blue); color: var(--accent-blue); display: block; }
    #statusBox.ok    { background: #d1fae5; color: #065f46; display: block; }
    #statusBox.error { background: var(--tag-red); color: var(--accent); display: block; }

    /* ── Legend ── */
    .legend {
      padding: 10px 14px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .legend-item {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  </style>
</head>
<body>

<div class="header">
  <h1>⛩ RTF 智能標記系統</h1>
  <p>Word 增益集版 · 直接操作文件格式</p>
</div>

<!-- 密度調校 -->
<div class="section">
  <div class="section-title">標記密度調校</div>

  <div class="slider-row">
    <div class="slider-label">
      <span>重要詞語（粗線底線）</span>
      <span class="slider-val" id="v-enhance">30%</span>
    </div>
    <input type="range" id="enhanceDensity" min="0" max="100" value="30" oninput="updateSlider(this,'v-enhance')">
  </div>

  <div class="slider-row">
    <div class="slider-label">
      <span>次要詞語（紅字灰線）</span>
      <span class="slider-val" id="v-verb">20%</span>
    </div>
    <input type="range" id="verbDensity" min="0" max="100" value="20" oninput="updateSlider(this,'v-verb')">
  </div>

  <div class="slider-row">
    <div class="slider-label">
      <span>黃藍網底比例</span>
      <span class="slider-val" id="v-shading">50%</span>
    </div>
    <input type="range" id="shadingDensity" min="0" max="100" value="50" oninput="updateSlider(this,'v-shading')">
  </div>

  <div class="slider-row">
    <div class="slider-label">
      <span>小括號出現比例</span>
      <span class="slider-val" id="v-bracket">40%</span>
    </div>
    <input type="range" id="bracketDensity" min="0" max="100" value="40" oninput="updateSlider(this,'v-bracket')">
  </div>
</div>

<!-- 當次補充 -->
<div class="section">
  <div class="section-title">當次特定補充</div>

  <div class="field-group">
    <label class="field-label">當次重要詞語（人名／地名／專用詞）</label>
    <textarea id="extraImportant" rows="3" placeholder="用逗號隔開，例如：玄空師父,關聖帝君"></textarea>
  </div>

  <div class="field-group">
    <label class="field-label">當次忽略詞語（只保留灰線）</label>
    <textarea id="extraIgnored" rows="2" placeholder="例如：這個、大家、我們"></textarea>
  </div>
</div>

<!-- 說明 -->
<div class="legend">
  <div class="legend-item" style="background:#fef9c3;border:1px solid #fde047">
    <span class="dot" style="background:#ca8a04"></span> 黃底重要詞
  </div>
  <div class="legend-item" style="background:#dbeafe;border:1px solid #93c5fd">
    <span class="dot" style="background:#1d4ed8"></span> 藍底次要詞
  </div>
  <div class="legend-item" style="background:#fee2e2;border:1px solid #fca5a5">
    <span class="dot" style="background:#dc2626"></span> 紅字灰線
  </div>
</div>

<!-- 按鈕 -->
<div class="btn-row">
  <button class="btn-primary" id="btnApply" onclick="applyMarkup()">
    ✦ 標記當前文件
  </button>
  <button class="btn-secondary" onclick="clearMarkup()">
    ↺ 清除所有標記
  </button>
</div>

<div id="statusBox"></div>

<script src="taskpane.js"></script>
<script>
  function updateSlider(input, valId) {
    const v = input.value;
    document.getElementById(valId).textContent = v + '%';
    const pct = v + '%';
    input.style.setProperty('--pct', pct);
    input.style.background =
      `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pct}, var(--line) ${pct})`;
  }
  // Init slider backgrounds
  ['enhanceDensity','verbDensity','shadingDensity','bracketDensity'].forEach(id => {
    const el = document.getElementById(id);
    updateSlider(el, {'enhanceDensity':'v-enhance','verbDensity':'v-verb','shadingDensity':'v-shading','bracketDensity':'v-bracket'}[id]);
  });

  function setStatus(msg, type) {
    const box = document.getElementById('statusBox');
    box.textContent = msg;
    box.className = type;
  }
</script>
</body>
</html>
